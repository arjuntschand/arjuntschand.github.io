name = "arjuntschand-track"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# Bind a free Analytics Engine dataset. Name is just a label; the dataset
# is created on first write.
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "site_visits"

# Route this worker only on the /api/sync path so the rest of the site
# continues to be served by GitHub Pages.
[[routes]]
pattern = "arjuntschand.com/api/sync"
zone_name = "arjuntschand.com"

[observability]
enabled = true
